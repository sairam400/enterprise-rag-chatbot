# docker-compose up   →   backend on http://localhost:8000
#
# Only ANTHROPIC_API_KEY is required in .env (copy from .env.example).
# The frontend service is added in Phase 5.
services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Persist the ChromaDB store across restarts.
      - ./backend/data:/app/data
      # Cache downloaded sentence-transformers models between runs.
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  hf-cache:
